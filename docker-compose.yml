name: ai-tool-tracker

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-tracker-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aitracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-aitracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ai-tracker

  redis:
    image: redis:7-alpine
    container_name: ai-tracker-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - ai-tracker

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-tracker-migrate
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aitracker}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aitracker}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-tracker
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-tracker-api
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aitracker}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aitracker}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /var/lib/ai-tracker/storage
      ENVIRONMENT: development
    volumes:
      - storage_data:/var/lib/ai-tracker/storage
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - ai-tracker

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-tracker-worker
    command:
      [
        "celery",
        "-A",
        "app.celery_app:celery_app",
        "worker",
        "--loglevel=info",
        "-Q",
        "ingestion,reports,alerts,email,maintenance",
      ]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aitracker}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aitracker}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /var/lib/ai-tracker/storage
      ENVIRONMENT: development
    volumes:
      - storage_data:/var/lib/ai-tracker/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-tracker

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-tracker-beat
    command:
      [
        "celery",
        "-A",
        "app.celery_app:celery_app",
        "beat",
        "--loglevel=info",
      ]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aitracker}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aitracker}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: development
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    restart: unless-stopped
    networks:
      - ai-tracker

  frontend:
    image: node:20-alpine
    container_name: ai-tracker-frontend
    profiles: [dev]
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"]
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-8000}/api/v1
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ai-tracker

networks:
  ai-tracker:
    name: ai-tracker-network

volumes:
  postgres_data:
    name: ai-tracker-postgres-data
  redis_data:
    name: ai-tracker-redis-data
  storage_data:
    name: ai-tracker-storage-data
  backups_data:
    name: ai-tracker-backups-data
