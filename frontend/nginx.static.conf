server {
    listen 4501;
    root /usr/share/nginx/html;
    index index.html;

    # API — browser calls /aitool/api/v1/... → FastAPI /api/v1/...
    location /aitool/api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /aitool/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ @aitool_spa;
    }

    location @aitool_spa {
        rewrite ^ /index.html break;
        root /usr/share/nginx/html;
    }

    location = /aitool {
        return 301 /aitool/;
    }

    # Bare /files/... links (without /aitool prefix) → SPA route under /aitool/
    location = /files/cursor-verification {
        return 301 /aitool/files/cursor-verification$is_args$args;
    }

    location ^~ /files/ {
        return 301 /aitool$request_uri;
    }
}
