# Host nginx template for foundry.inapp.com
# Replace BACKEND_PORT and FRONTEND_PORT with values from .env (API_PORT / FRONTEND_PORT).

# API — /aitool/api/v1/... → backend /api/v1/...
location /aitool/api/ {
    proxy_pass http://127.0.0.1:BACKEND_PORT/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Frontend SPA — /aitool/ → frontend container (vite preview on FRONTEND_PORT)
location /aitool/ {
    proxy_pass http://127.0.0.1:FRONTEND_PORT/aitool/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /aitool {
    return 301 /aitool/;
}
