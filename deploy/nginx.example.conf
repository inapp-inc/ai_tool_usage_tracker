# Host nginx template for foundry.inapp.com
# Single upstream on APP_PORT / FRONTEND_PORT (default 4501).
#
# The frontend container serves:
#   /aitool/         → React SPA
#   /aitool/api/     → proxied to api:8000 (internal Docker network)

location /aitool/ {
    proxy_pass http://127.0.0.1:4501/aitool/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /aitool {
    return 301 /aitool/;
}
