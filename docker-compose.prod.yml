# Production overrides — public frontend on APP_PORT; API not published (use host reverse proxy).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Public URLs (when TLS terminates at foundry.inapp.com):
#   App:  https://foundry.inapp.com/aitool/
#   API:  https://foundry.inapp.com/aitool/api/v1/

services:
  api:
    ports: []
    environment:
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS:-https://foundry.inapp.com}

  frontend:
    ports:
      - "${APP_PORT:-4501}:4501"
